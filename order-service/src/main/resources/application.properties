quarkus.application.name=order-service
quarkus.http.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${INFRA_HOST}:5433/orderdb

quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true

quarkus.http.port=8082

quarkus.swagger-ui.always-include=true

quarkus.devservices.enabled=false

# URL do user-service ? o order-service vai chamar esse endereço
quarkus.rest-client.user-service.url=http://localhost:8081

# Kafka ? servidor remoto
kafka.bootstrap.servers=${INFRA_HOST}:9092

# Producer ? publica no topic order.created
mp.messaging.outgoing.order-created.connector=smallrye-kafka
mp.messaging.outgoing.order-created.topic=order.created
mp.messaging.outgoing.order-created.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Observabilidade
quarkus.otel.exporter.otlp.endpoint=http://${INFRA_HOST}:4317
quarkus.otel.service.name=order-service

# Métricas
quarkus.micrometer.export.prometheus.enabled=true

quarkus.oidc.auth-server-url=http://${INFRA_HOST}:8280/realms/ecommerce
quarkus.oidc.client-id=ecommerce-app
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
quarkus.oidc.token.issuer=http://${INFRA_HOST}:8280/realms/ecommerce