version: '3.8'

services:
  postgres-order:
    image: postgres:16-alpine
    container_name: order-service-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data

volumes:
  postgres_order_data: