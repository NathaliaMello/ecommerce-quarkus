quarkus.application.name=notification-service
quarkus.http.host=0.0.0.0

quarkus.http.port=8083

quarkus.swagger-ui.always-include=true
quarkus.devservices.enabled=false

# Kafka ? aponta para o servidor remoto
kafka.bootstrap.servers=${INFRA_HOST}:9092

# Consumer ? escuta o topic order.created
mp.messaging.incoming.order-created.connector=smallrye-kafka
mp.messaging.incoming.order-created.topic=order.created
mp.messaging.incoming.order-created.group.id=notification-service
mp.messaging.incoming.order-created.auto.offset.reset=earliest
mp.messaging.incoming.order-created.value.deserializer=com.mello.nathalia.notification.domain.OrderCreatedEventDeserializer

# Observabilidade
quarkus.otel.exporter.otlp.endpoint=http://${INFRA_HOST}:4317
quarkus.otel.service.name=notification-service

# MÈtricas
quarkus.micrometer.export.prometheus.enabled=true

quarkus.oidc.auth-server-url=http://${INFRA_HOST}:8280/realms/ecommerce
quarkus.oidc.client-id=ecommerce-app
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET}

# OIDC Client para obter tokens nas chamadas internas (novo)
quarkus.oidc-client.auth-server-url=http://${INFRA_HOST}:8280/realms/ecommerce
quarkus.oidc-client.client-id=ecommerce-app
quarkus.oidc-client.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
quarkus.oidc-client.grant.type=client
quarkus.oidc-client.id=internal

# Groq API
groq.api.url=https://api.groq.com
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.1-8b-instant

# Groq REST Client
quarkus.rest-client.groq-api.url=${groq.api.url}

# REST Clients internos
quarkus.rest-client.order-service.url=http://localhost:8082
quarkus.rest-client.user-service.url=http://localhost:8081